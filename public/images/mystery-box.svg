<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0a0a1a"/>
  <!-- Box body -->
  <rect x="80" y="180" width="240" height="180" rx="8" fill="#1a1a4a" stroke="#3030ff" stroke-width="3"/>
  <!-- Box lid -->
  <rect x="65" y="150" width="270" height="45" rx="6" fill="#2020aa" stroke="#4040ff" stroke-width="3"/>
  <!-- Ribbon horizontal -->
  <rect x="80" y="150" width="240" height="45" fill="none"/>
  <rect x="180" y="150" width="40" height="185" fill="#00ff66" opacity="0.3"/>
  <!-- Ribbon bow -->
  <ellipse cx="160" cy="148" rx="30" ry="18" fill="#00ff66" opacity="0.8"/>
  <ellipse cx="240" cy="148" rx="30" ry="18" fill="#00ff66" opacity="0.8"/>
  <circle cx="200" cy="148" r="15" fill="#00ff88"/>
  <!-- Question mark -->
  <text x="200" y="290" font-size="80" font-family="Arial Black, sans-serif" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" opacity="0.9">?</text>
  <!-- Cash bills flying -->
  <rect x="60" y="90" width="50" height="28" rx="4" fill="#00cc44" transform="rotate(-15 85 104)"/>
  <text x="85" y="108" font-size="10" fill="#fff" text-anchor="middle" transform="rotate(-15 85 104)">$100</text>
  <rect x="290" y="70" width="50" height="28" rx="4" fill="#00cc44" transform="rotate(12 315 84)"/>
  <text x="315" y="88" font-size="10" fill="#fff" text-anchor="middle" transform="rotate(12 315 84)">$100</text>
  <rect x="310" y="130" width="50" height="28" rx="4" fill="#00cc44" transform="rotate(20 335 144)"/>
  <text x="335" y="148" font-size="10" fill="#fff" text-anchor="middle" transform="rotate(20 335 144)">$100</text>
  <!-- Stars -->
  <text x="40" y="160" font-size="24" fill="#ffcc00">✦</text>
  <text x="350" y="200" font-size="18" fill="#ffcc00">✦</text>
  <text x="130" y="60" font-size="14" fill="#ffcc00">✦</text>
</svg>
